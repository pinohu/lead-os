name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Create GitHub Release with dist artifact
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/lead-os-embed.js
            dist/lead-os-embed.js.map
          generate_release_notes: true

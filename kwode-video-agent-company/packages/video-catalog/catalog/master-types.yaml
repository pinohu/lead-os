# Master video catalog — 50 base video types.
# Niche-specific overrides live in catalog/niche-overrides.yaml.

defaults:
  default_agent_chain: &default_chain
    - client-intake-agent
    - brand-profile-agent
    - creative-brief-agent
    - scriptwriter-agent
    - storyboard-director-agent
    - scene-planning-agent
    - prompt-engineer-agent
    - visual-consistency-agent
    - vimax-coordinator-agent
    - qa-reviewer-agent
    - brand-safety-agent
    - legal-rights-consent-agent
    - client-approval-agent
    - delivery-agent

  short_chain: &short_chain
    - client-intake-agent
    - brand-profile-agent
    - creative-brief-agent
    - scriptwriter-agent
    - storyboard-director-agent
    - prompt-engineer-agent
    - qa-reviewer-agent
    - delivery-agent

  standard_qa: &standard_qa
    - visual_quality
    - business_accuracy
    - brand_consistency
    - caption_accuracy
    - rights_and_consent
    - claims_and_compliance
    - platform_readiness
    - conversion_strength
    - client_readiness

video_types:
  - video_type_id: business-intro
    category: business-introduction
    title: Business Introduction Video
    description: A 60-90s introduction to a business, its mission, and its differentiators.
    target_audience: First-time visitors / prospects
    funnel_stage: TOFU
    recommended_duration: 90
    recommended_aspect_ratios: ["16:9", "9:16"]
    required_inputs: ["business_name", "services", "service_area"]
    optional_inputs: ["proof_points", "logo", "founder_quote"]
    ideal_tools: ["vimax", "supermachine", "flexclip", "gumlet", "suitedash"]
    agent_chain: *default_chain
    qa_requirements: *standard_qa
    monetization_path: ["Starter Video Pack", "Monthly Visibility Pack"]

  - video_type_id: service-explainer
    category: service-explainer
    title: Service Explainer Video
    description: Walk a viewer through a specific service from problem to outcome.

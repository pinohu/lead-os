    recommended_duration: 90
    recommended_aspect_ratios: ["16:9", "9:16"]
    required_inputs: ["service_name", "problem_statement", "outcome"]
    optional_inputs: ["case_study"]
    ideal_tools: ["vimax", "supermachine", "vadoo", "flexclip", "gumlet"]
    agent_chain: *default_chain

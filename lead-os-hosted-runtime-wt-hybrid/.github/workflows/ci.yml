name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify migrations
        run: npm run verify:migrations

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

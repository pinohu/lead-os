services:
  - type: web
    name: lead-os
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LEAD_OS_TENANT_ID
        value: default-tenant
      - key: DATABASE_URL
        fromDatabase:
          name: lead-os-db
          property: connectionString

databases:
  - name: lead-os-db
    plan: starter
    databaseName: lead_os

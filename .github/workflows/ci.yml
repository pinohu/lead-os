name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  typecheck:
    name: Type Check (Hybrid)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lead-os-runtime
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: lead-os-runtime/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Test (Hybrid)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lead-os-runtime
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: lead-os-runtime/package-lock.json
      - run: npm ci
      - run: npm run test:ci

  completeness:
    name: Completeness Gate (Hybrid)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lead-os-runtime
    env:
      LEAD_OS_COMPLETENESS_ALLOW_NETWORK: "false"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: lead-os-runtime/package-lock.json
      - run: npm ci
      - run: npm run check:completeness

  build-hybrid:
    name: Build Hybrid Runtime
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lead-os-runtime
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: lead-os-runtime/package-lock.json
      - run: npm ci
      - run: npm run build

  typecheck-erie:
    name: Type Check (Erie Pro)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: erie-pro
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: erie-pro/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  test-erie:
    name: Test (Erie Pro)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: erie-pro
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: erie-pro/package-lock.json
      - run: npm ci
      - run: npm test

  build-erie:
    name: Build Erie Pro
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: erie-pro
    # Next 15's "collecting page data" step imports route modules, which
    # eagerly read DATABASE_URL (Prisma) and STRIPE_SECRET_KEY (stripe-
    # integration). CI doesn't have real secrets, so we feed dummies that
    # satisfy the runtime checks without touching anything external.
    env:
      DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
      STRIPE_SECRET_KEY: "sk_test_dummy_for_build_only"
      STRIPE_WEBHOOK_SECRET: "whsec_dummy_for_build_only"
      NEXTAUTH_SECRET: "ci-dummy-secret-not-used-at-runtime"
      NEXTAUTH_URL: "http://localhost:3000"
      SKIP_ENV_VALIDATION: "true"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: erie-pro/package-lock.json
      - run: npm ci
      - run: npm run build

  build-edge:
    name: Build Edge Layer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: neatcircle-beta
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: neatcircle-beta/package-lock.json
      - run: npm ci
      - run: npm run build

  build-embed-widgets:
    name: Build Embed Widgets
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lead-os-embed-widgets
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: lead-os-embed-widgets/package-lock.json
      - run: npm ci
      - run: npm run build

  security-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Audit Hybrid Runtime
        working-directory: lead-os-runtime
        run: npm audit --audit-level=critical || true
      - name: Audit Erie Pro
        working-directory: erie-pro
        run: npm audit --audit-level=critical || true
      - name: Audit NeatCircle
        working-directory: neatcircle-beta
        run: npm audit --audit-level=critical || true
      - name: Audit Embed Widgets
        working-directory: lead-os-embed-widgets
        run: npm audit --audit-level=critical || true

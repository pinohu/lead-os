name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lead-os-hosted-runtime-wt-hybrid
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: lead-os-hosted-runtime-wt-hybrid/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lead-os-hosted-runtime-wt-hybrid
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: lead-os-hosted-runtime-wt-hybrid/package-lock.json
      - run: npm ci
      - run: npm run test:ci

  build-hybrid:
    name: Build Hybrid Runtime
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lead-os-hosted-runtime-wt-hybrid
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: lead-os-hosted-runtime-wt-hybrid/package-lock.json
      - run: npm ci
      - run: npm run build

  build-edge:
    name: Build Edge Layer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: neatcircle-beta
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: neatcircle-beta/package-lock.json
      - run: npm ci
      - run: npm run build

  test-public:
    name: Test Public Runtime
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lead-os-hosted-runtime-wt-public
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: lead-os-hosted-runtime-wt-public/package-lock.json
      - run: npm ci
      - run: npm test

  build-public:
    name: Build Public Runtime
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lead-os-hosted-runtime-wt-public
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: lead-os-hosted-runtime-wt-public/package-lock.json
      - run: npm ci
      - run: npm run build
